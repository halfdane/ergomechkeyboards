<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="'Fira Sans','Segoe UI',system-ui,sans-serif">
  <!-- Three ergonomic levers stacked: split, tenting, thumb keys -> neutral posture -->
  <style>
    .h{fill:#eee8d5;font-size:30px;font-weight:700;}
    .lbl{fill:#93a1a1;font-size:22px;}
    .kbd{fill:#0d4450;stroke:#2aa198;stroke-width:2.5;}
    .key{fill:#0a3640;stroke:#2aa198;stroke-width:1.2;}
    .thumb{fill:#155e2a;stroke:#859900;stroke-width:1.5;}
    .arrow{stroke:#b58900;stroke-width:4;fill:none;stroke-linecap:round;}
  </style>

  <text x="500" y="48" text-anchor="middle" class="h">Drei Hebel für neutrale Haltung</text>

  <!-- 1. SPLIT -->
  <g transform="translate(160 150)">
    <rect x="-90" y="-40" width="80" height="100" rx="12" class="kbd"/>
    <rect x="30" y="-40" width="80" height="100" rx="12" class="kbd"/>
    <path class="arrow" d="M-10 100 L -10 130 M 30 100 L 30 130"/>
    <path class="arrow" d="M-30 120 L -60 120 M 50 120 L 80 120"/>
    <polygon points="-60,112 -72,120 -60,128" fill="#b58900"/>
    <polygon points="80,112 92,120 80,128" fill="#b58900"/>
  </g>
  <text x="160" y="330" text-anchor="middle" class="lbl" fill="#268bd2" font-weight="700">1 · Splitten</text>
  <text x="160" y="362" text-anchor="middle" class="lbl">Hälften auseinander</text>
  <text x="160" y="388" text-anchor="middle" class="lbl">→ Schultern offen</text>

  <!-- 2. TENTING -->
  <g transform="translate(500 150)">
    <polygon points="-90,60 -10,60 -25,-30 -75,-30" class="kbd"/>
    <polygon points="90,60 10,60 25,-30 75,-30" class="kbd"/>
    <path class="arrow" d="M-130 60 q 20 -60 40 -90" />
    <path class="arrow" d="M130 60 q -20 -60 -40 -90" />
  </g>
  <text x="500" y="330" text-anchor="middle" class="lbl" fill="#2aa198" font-weight="700">2 · Tenting</text>
  <text x="500" y="362" text-anchor="middle" class="lbl">Innenkanten anheben</text>
  <text x="500" y="388" text-anchor="middle" class="lbl">→ keine Pronation</text>

  <!-- 3. THUMB KEYS -->
  <g transform="translate(840 150)">
    <rect x="-80" y="-40" width="160" height="70" rx="10" class="kbd"/>
    <g class="key">
      <rect x="-70" y="-32" width="26" height="26" rx="5"/><rect x="-40" y="-32" width="26" height="26" rx="5"/><rect x="-10" y="-32" width="26" height="26" rx="5"/><rect x="20" y="-32" width="26" height="26" rx="5"/><rect x="50" y="-32" width="26" height="26" rx="5"/>
    </g>
    <g class="thumb">
      <rect x="-30" y="42" width="30" height="30" rx="7"/>
      <rect x="4" y="42" width="30" height="30" rx="7"/>
    </g>
    <path class="arrow" d="M-12 95 q 0 18 0 22" stroke="#859900"/>
  </g>
  <text x="840" y="330" text-anchor="middle" class="lbl" fill="#859900" font-weight="700">3 · Daumentasten</text>
  <text x="840" y="362" text-anchor="middle" class="lbl">starke Daumen nutzen</text>
  <text x="840" y="388" text-anchor="middle" class="lbl">→ Pinky entlasten</text>

  <!-- result banner -->
  <g transform="translate(500 460)">
    <rect x="-270" y="-26" width="540" height="52" rx="26" fill="#073642" stroke="#859900" stroke-width="2.5"/>
    <text x="0" y="8" text-anchor="middle" fill="#eee8d5" font-size="26" font-weight="700">= gerade Handgelenke, lockere Schultern</text>
  </g>
</svg>
