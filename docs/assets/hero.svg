<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="'Fira Sans','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="halfL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#073642"/>
      <stop offset="1" stop-color="#002b36"/>
    </linearGradient>
    <linearGradient id="halfR" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#073642"/>
      <stop offset="1" stop-color="#002b36"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.45"/>
    </filter>

    <!-- One hand: 3x5 column-staggered keys + thumb cluster (same geometry as
         finger-travel-36.svg), recentred so the group origin sits in the middle. -->
    <g id="halfKeys" transform="translate(-260 -255)">
      <g fill="#0d4450" stroke="#2aa198" stroke-width="1.5">
        <!-- col1 (pinky)  x120  offset +10 -->
        <rect x="120" y="150" width="50" height="50" rx="8"/>
        <rect x="120" y="206" width="50" height="50" rx="8"/>
        <rect x="120" y="262" width="50" height="50" rx="8"/>
        <!-- col2 (ring)   x176  offset 0 -->
        <rect x="176" y="140" width="50" height="50" rx="8"/>
        <rect x="176" y="196" width="50" height="50" rx="8"/>
        <rect x="176" y="252" width="50" height="50" rx="8"/>
        <!-- col3 (middle) x232  offset -12 -->
        <rect x="232" y="128" width="50" height="50" rx="8"/>
        <rect x="232" y="184" width="50" height="50" rx="8"/>
        <rect x="232" y="240" width="50" height="50" rx="8"/>
        <!-- col4 (index)  x288  offset -4 -->
        <rect x="288" y="136" width="50" height="50" rx="8"/>
        <rect x="288" y="192" width="50" height="50" rx="8"/>
        <rect x="288" y="248" width="50" height="50" rx="8"/>
        <!-- col5 (inner)  x344  offset +6 -->
        <rect x="344" y="146" width="50" height="50" rx="8"/>
        <rect x="344" y="202" width="50" height="50" rx="8"/>
        <rect x="344" y="258" width="50" height="50" rx="8"/>
      </g>
      <!-- thumb cluster: sits below the inner columns, slightly fanned -->
      <g fill="#155e2a" stroke="#859900" stroke-width="1.5">
        <rect x="300" y="330" width="48" height="44" rx="9"/>
        <rect x="352" y="338" width="48" height="44" rx="9"/>
      </g>
    </g>
  </defs>

  <!-- left half, tilted outward -->
  <g filter="url(#soft)" transform="translate(250 300) rotate(-12)">
    <rect x="-158" y="-148" width="316" height="300" rx="24" fill="url(#halfL)" stroke="#2aa198" stroke-width="3"/>
    <use href="#halfKeys"/>
  </g>

  <!-- right half, mirrored + tilted the other way -->
  <g filter="url(#soft)" transform="translate(750 300) rotate(12)">
    <rect x="-158" y="-148" width="316" height="300" rx="24" fill="url(#halfR)" stroke="#2aa198" stroke-width="3"/>
    <g transform="scale(-1,1)"><use href="#halfKeys"/></g>
  </g>

  <!-- happy wrists spark -->
  <g transform="translate(500 120)" fill="none" stroke="#b58900" stroke-width="6" stroke-linecap="round">
    <path d="M-26 0 a26 26 0 1 1 52 0"/>
    <line x1="-12" y1="-6" x2="-12" y2="2"/>
    <line x1="12" y1="-6" x2="12" y2="2"/>
    <path d="M-14 14 q14 14 28 0" stroke="#859900"/>
  </g>
  <text x="500" y="520" text-anchor="middle" fill="#586e75" font-size="26" font-style="italic">zwei Hälften, null Kompromisse</text>
</svg>
