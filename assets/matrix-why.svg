<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" font-family="'Fira Sans','Segoe UI',system-ui,sans-serif">
  <!-- Why a matrix: direct wiring chaos vs row/col matrix -->
  <style>
    .h{fill:#eee8d5;font-size:28px;font-weight:700;}
    .lbl{fill:#93a1a1;font-size:21px;}
    .mcu{fill:#073642;stroke:#586e75;stroke-width:2;}
    .key{fill:#0a3640;stroke:#586e75;stroke-width:1.4;}
    .chaos{stroke:#dc322f;stroke-width:1.6;fill:none;opacity:0.85;}
    .row{stroke:#b58900;stroke-width:3;fill:none;}
    .col{stroke:#268bd2;stroke-width:3;fill:none;}
  </style>

  <line x1="500" y1="40" x2="500" y2="500" stroke="#073642" stroke-width="2" stroke-dasharray="6 8"/>

  <!-- LEFT: direct wiring -->
  <text x="250" y="60" text-anchor="middle" class="h" fill="#dc322f">Direkt: 1 Draht je Taste</text>
  <!-- mcu -->
  <rect x="180" y="360" width="140" height="50" rx="8" class="mcu"/>
  <text x="250" y="392" text-anchor="middle" fill="#93a1a1" font-size="18">Controller</text>
  <!-- 9 keys in 3x3 -->
  <g class="key">
    <rect x="150" y="120" width="40" height="40" rx="6"/><rect x="230" y="120" width="40" height="40" rx="6"/><rect x="310" y="120" width="40" height="40" rx="6"/>
    <rect x="150" y="190" width="40" height="40" rx="6"/><rect x="230" y="190" width="40" height="40" rx="6"/><rect x="310" y="190" width="40" height="40" rx="6"/>
    <rect x="150" y="260" width="40" height="40" rx="6"/><rect x="230" y="260" width="40" height="40" rx="6"/><rect x="310" y="260" width="40" height="40" rx="6"/>
  </g>
  <!-- a wire from every key to the mcu -->
  <g class="chaos">
    <path d="M170 160 C 160 320, 210 350, 230 360"/>
    <path d="M250 160 C 250 300, 245 350, 245 360"/>
    <path d="M330 160 C 340 300, 280 350, 260 360"/>
    <path d="M170 230 C 165 320, 215 350, 232 362"/>
    <path d="M250 230 C 250 300, 248 350, 248 362"/>
    <path d="M330 230 C 335 300, 285 350, 262 362"/>
    <path d="M170 300 C 175 330, 220 350, 235 363"/>
    <path d="M250 300 C 250 330, 250 350, 250 363"/>
    <path d="M330 300 C 330 330, 280 350, 265 363"/>
  </g>
  <text x="250" y="450" text-anchor="middle" class="lbl" fill="#dc322f">9 Tasten → 9 Pins. 36 Tasten → 36 Pins. 😱</text>

  <!-- RIGHT: matrix -->
  <text x="750" y="60" text-anchor="middle" class="h" fill="#859900">Matrix: Reihen × Spalten</text>
  <!-- 3 rows (horizontal) and 3 cols (vertical) -->
  <g class="row">
    <line x1="620" y1="140" x2="880" y2="140"/>
    <line x1="620" y1="210" x2="880" y2="210"/>
    <line x1="620" y1="280" x2="880" y2="280"/>
  </g>
  <g class="col">
    <line x1="660" y1="110" x2="660" y2="320"/>
    <line x1="750" y1="110" x2="750" y2="320"/>
    <line x1="840" y1="110" x2="840" y2="320"/>
  </g>
  <!-- key switches at intersections -->
  <g fill="#0a3640" stroke="#93a1a1" stroke-width="1.6">
    <circle cx="660" cy="140" r="9"/><circle cx="750" cy="140" r="9"/><circle cx="840" cy="140" r="9"/>
    <circle cx="660" cy="210" r="9"/><circle cx="750" cy="210" r="9"/><circle cx="840" cy="210" r="9"/>
    <circle cx="660" cy="280" r="9"/><circle cx="750" cy="280" r="9"/><circle cx="840" cy="280" r="9"/>
  </g>
  <!-- to mcu -->
  <rect x="680" y="360" width="140" height="50" rx="8" class="mcu"/>
  <text x="750" y="392" text-anchor="middle" fill="#93a1a1" font-size="18">Controller</text>
  <g class="row"><path d="M620 140 C 600 340, 670 350, 695 360"/></g>
  <g class="col"><path d="M840 320 C 850 345, 810 352, 800 360"/></g>
  <text x="750" y="450" text-anchor="middle" class="lbl" fill="#859900">9 Tasten → 6 Pins. 36 Tasten → 12 Pins.</text>
</svg>
